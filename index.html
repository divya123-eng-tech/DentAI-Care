<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="2; url=http://127.0.0.1:5000/">
    <title>DentAI Flask App</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        color: #172033;
        background: #eef5f8;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid #c9d8df;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 48px rgba(23, 32, 51, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.55;
      }

      code {
        padding: 2px 6px;
        border-radius: 4px;
        background: #edf2f5;
      }

      a {
        color: #0b6b87;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DentAI runs with Flask</h1>
      <p>Start the backend first with <code>python run.py</code> or the VS Code task <code>Run DentAI Flask App</code>.</p>
      <p>Then open <a href="http://127.0.0.1:5000/">http://127.0.0.1:5000/</a>.</p>
      <p>If the Flask server is already running, this page will redirect automatically.</p>
    </main>
  </body>
</html>
